      introduction:
        title: 先理解分层
        desc: 先弄清 headless 与 UI 的职责边界，再挑组件会更准确。
      theming:
        title: 先看主题能力
        desc: 想做样式体系对齐或 slot 覆盖时，先读主题指南最省时间。
    featured:
      button: 按钮、操作入口和状态反馈的基础起点。
      input: 表单输入最常用的起始组件，可快速扩展到复杂录入场景。
      select: 在数据选择、筛选和组合输入场景里都很高频。
      dialog: 承载确认、编辑与强打断流程的核心浮层组件。
      table: 用于复杂数据展示、对比与结构化阅读。
      form: 统一表单组织、校验和交互反馈的组合入口。
    sections:
      featured:
        title: 高频组件
  button:
    title: 按钮
    desc: 按钮组件
  home:
    title: SoybeanUI
    description: "面向 Vue 3 的强大而优雅的现代组件库：{'@'}soybeanjs/headless 提供无头交互能力，{'@'}soybeanjs/ui 提供带默认样式的组件封装，为团队建立一致的交互范式、高质量的界面体验与可扩展的设计系统基础。"
    kicker: Vue 3 组件系统
    actions:
      start: 开始使用
      browse: 浏览组件
      github: GitHub
    stats_title: 库概览
    stats:
      components: 组件数
      categories: 分类数
      packages: 包数
      guides: 指南数
    features:
      headless_first:
        title: Headless First
        desc: "{'@'}soybeanjs/headless 只提供状态、行为与可访问性语义，便于直接复用到自定义设计系统。"
      styled_wrappers:
        title: 样式包装层
        desc: "{'@'}soybeanjs/ui 提供带默认样式的 S 前缀组件，让常见界面可以直接交付而不必从零包样式。"
      accessible:
        title: 内建可访问性
        desc: 遵循 WAI-ARIA 模式，覆盖键盘导航、焦点管理与语义状态同步。
      type_safe:
        title: 类型安全 API
        desc: 基于 TypeScript 构建，组件、插槽与配置项都有清晰的类型反馈。
      slot_overrides:
        title: Slot 级样式覆盖
        desc: 通过 ui prop 和 slot 映射精确覆盖局部样式，而不是整体重写组件。
      theme_ready:
        title: Theme-ready Variants
        desc: 基于 UnoCSS 与 tailwind-variants 组织变体，便于统一令牌和主题扩展。
      component_coverage:
        title: 完整组件版图
        desc: 覆盖通用、表单、导航、浮层与数据展示等核心界面场景。
      ecosystem:
        title: Vue 生态友好
        desc: 提供 Nuxt、自动导入与文档示例支持，让接入、演示和维护更顺手。
    quick_links:
      get_started:
        title: 快速接入
        desc: 完成安装、样式接入与首个页面渲染，先把基础链路跑通。
      introduction:
        title: 理解双层分工
        desc: 先看无头能力与带样式封装如何分工，再决定接入深度与样式策略。
      components:
        title: 浏览组件版图
        desc: 按类别查看基础组件、模式组件与工具组件，快速收敛选型范围。
      theming:
        title: 配置主题系统
        desc: 理解 tokens、variants 与 ui slot 覆盖的关系，避免后续返工。
    sections:
      highlights:
        title: 核心特性
      featured:
        title: 高频组件入口
        desc: 如果你想先感受体系能力，这些组件最能代表 SoybeanUI 的常用交互面。
      categories:
        title: 按场景浏览组件
        unit: 个组件
    featured:
      button: 用于操作触发、状态切换与主要流程推进的基础入口。
      input: 适合作为输入、搜索与复杂表单编排的通用起点。
      select: 覆盖筛选、映射与结构化选项选择等高频场景。
      dialog: 承载确认、编辑与强打断流程的核心浮层能力。
      table: 面向复杂数据阅读、对比与结构化展示的关键组件。
      form: 把字段组织、校验与提交反馈统一到同一工作流。
