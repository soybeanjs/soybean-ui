      architecture:
        title: Layered system overview
    featured:
      button: A high-frequency entry point for actions, state transitions, and forward flow.
      input: A practical base for everything from simple entry to richer form composition.
      select: Useful for filtering, option picking, and structured data selection flows.
      dialog: A strong fit for confirmation, editing, and multi-step overlay experiences.
      table: One of the core components for data reading, comparison, and structured display.
      form: A stable way to align fields, validation, and submission behavior.
