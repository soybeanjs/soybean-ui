      components: Components
      categories: Categories
      packages: Packages
      guides: Guides
    features:
      accessible:
        title: Accessible
        desc: Follows WAI-ARIA patterns for accessibility.
      headless:
        title: Headless
        desc: Logic and styles are separated.
      type_safe:
        title: Type Safe
        desc: Written in TypeScript with full type support.
      customizable:
        title: Customizable
        desc: Built with UnoCSS and tailwind-variants for easy theming.
    quick_links:
      get_started:
        title: Quick Start
        desc: Install the package, wire the config provider, and ship your first screen faster.
      introduction:
        title: Architecture Intro
        desc: Understand the headless-first layering model before you compose real interfaces.
      components:
        title: Component Catalog
        desc: Browse the full set of primitives, patterns, and utility building blocks by category.
      theming:
        title: Theming Guide
        desc: Learn how design tokens, variants, and UI slot overrides fit together.
    workflow:
      explore:
        title: Explore the API surface
        desc: Start from docs pages that combine overview, examples, and API tables in one place.
      compose:
        title: Compose with headless + styled layers
        desc: Use headless logic where you need control, then adopt Soybean UI wrappers for fast delivery.
      ship:
        title: Validate and ship confidently
        desc: Follow the same docs pages for props, slots, emits, and usage constraints during implementation.
    architecture:
      headless:
        title: Headless foundation
        desc: "State, behavior, accessibility, and semantic structure live in {'@'}soybeanjs/headless."
        badge: Logic
      ui:
        title: Styled wrapper layer
        desc: "{'@'}soybeanjs/ui applies variants, slot styling, and polished defaults without breaking composition."
        badge: Visuals
      docs:
        title: Documentation layer
        desc: The docs site aligns demos, API tables, and navigation so design and engineering can read from one source.
        badge: Reference
    sections:
      highlights:
        title: Why teams start here
