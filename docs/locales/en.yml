    title: Soybean UI
    description: A modern, headless-first UI component library for Vue 3. Crafted for performance, accessibility, and developer experience.
    kicker: Vue 3 Documentation Hub
    helper: Start with the quick-start path, jump into component categories, and use the docs as a working reference for implementation, theming, and API decisions.
    actions:
      start: Get Started
      browse: Browse Components
      github: GitHub
