components:
  common:
    demo: Demos
  catalog:
    title: Component Catalog
    description: Browse every Soybean UI component by category and jump straight into the dedicated docs page for each one.
    helper: Use the category view below or press Command + K to jump to a component directly.
    kicker: Component catalog and entry points
    group_count: '{count} components'
    actions:
      open: Open documentation
      start: Quick Start
      learn: Learn the architecture
    badges:
      new: New
    stats:
      total: Total components
      categories: Categories
      featured: Featured
      new: New components
    stats_title: Catalog at a glance
    quick_actions:
      quick_start:
        title: Set up first
        desc: If the package is not installed yet, start from the quick-start guide before browsing deeper.
      introduction:
        title: Understand the layers
        desc: Learn the headless and UI split first so component choices stay intentional.
      theming:
        title: Review theming early
        desc: If styling and slot overrides matter, the theming guide saves time before implementation.
    featured:
      button: The starting point for actions, decisions, and primary user flows.
      input: A reliable base for plain text entry and more complex form composition.
      select: A high-frequency choice for filtering, picking, and structured input flows.
      dialog: The core overlay for confirmations, editing, and interruptive flows.
      table: A key surface for dense data reading, comparison, and structured display.
      form: The entry point for aligning validation, inputs, and submission feedback.
    sections:
      featured:
        title: High-signal components
        desc: If you are unsure where to begin, these components best represent the system in real work.
  button:
    title: Button
    desc: Button component
  home:
    title: SoybeanUI
    description: 'A powerful, elegant Vue 3 component system with headless primitives and ready-to-use styled wrappers.'
    kicker: Vue 3 Component System
    actions:
      start: Get Started
      browse: Browse Components
      github: GitHub
    stats_title: Library overview
    stats:
      components: Components
      categories: Categories
      packages: Packages
      guides: Guides
    features:
      headless_first:
        title: Headless First
        desc: "{'@'}soybeanjs/headless focuses on state, behavior, and accessibility semantics without shipping any visual styling."
      styled_wrappers:
        title: Styled Wrappers
        desc: "{'@'}soybeanjs/ui ships S-prefixed styled components so common product surfaces can be delivered without rebuilding presentation from scratch."
      accessible:
        title: Accessibility Built In
        desc: Follows WAI-ARIA patterns with keyboard navigation, focus management, and semantic state handling included.
      type_safe:
        title: Type-safe APIs
        desc: Built with TypeScript so components, slots, and configuration surfaces stay explicit during implementation.
      slot_overrides:
        title: Slot-level Overrides
        desc: Override local styling precisely through ui slot maps instead of rewriting entire components.
      theme_ready:
        title: Theme-ready Variants
        desc: Variants are organized with UnoCSS and {'@'}soybeanjs/cva so design tokens and themes stay scalable.
      component_coverage:
        title: Broad Component Coverage
        desc: Covers general UI, forms, navigation, overlays, and data display for the screens teams build most often.
      ecosystem:
        title: Vue Ecosystem Friendly
        desc: Works smoothly with Nuxt, auto-import workflows, and living examples that shorten adoption time.
    quick_links:
      get_started:
        title: Quick Setup
        desc: Install the package, wire the styling layer, and get the first screen rendering end to end.
      introduction:
        title: Understand the Split
        desc: Review how the unstyled headless layer and the styled UI layer divide responsibility before choosing an integration strategy.
      components:
        title: Browse the Catalog
        desc: Narrow the component choice set quickly by scanning primitives, patterns, and utilities by category.
      theming:
        title: Configure Theming
        desc: Learn how tokens, variants, and ui slot overrides work together before deeper customization.
    sections:
      highlights:
        title: Core Features
      featured:
        title: High-signal Components
        desc: If you want to feel the system quickly, these components show the most representative interaction surfaces.
      categories:
        title: Browse by Scenario
        unit: components
      architecture:
        title: Core Architecture
        desc: The two-layer split lets logic reuse and visual expression evolve independently without breaking composition.
    featured:
      button: A foundational entry point for actions, state transitions, and forward motion in a flow.
      input: A reliable starting point for entry, search, and richer form composition.
      select: Covers filtering, mapping, and structured option selection in frequent product scenarios.
      dialog: A core overlay capability for confirmations, editing flows, and interruptive tasks.
      table: A key component for dense data reading, comparison, and structured presentation.
      form: Aligns field composition, validation, and submission feedback inside one workflow.
